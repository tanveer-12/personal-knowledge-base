# Docker is for local testing only. Primary dev runs in Colab.
services:
  backend:
    build: ./backend
    container_name: pkb-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:cached
    env_file:
      - ./backend/.env
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - db
  
  db:
    image: postgres:15
    container_name: pkb-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neondb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: